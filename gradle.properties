# Performance
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Djdk.tls.client.protocols=TLSv1.2 -Dhttps.protocols=TLSv1.2 -Dhttp.keepAlive=false
org.gradle.parallel=true
org.gradle.caching=true

# Android
android.useAndroidX=true
android.enableJetifier=false
android.suppressUnsupportedCompileSdk=35

# Network resilience
systemProp.http.connectionTimeout=30000
systemProp.http.socketTimeout=30000
