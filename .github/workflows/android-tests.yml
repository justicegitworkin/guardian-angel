name: Android tests

# Runs unit tests on every push and PR. Catches regressions before they
# get merged. Lightweight — just JVM unit tests, no emulator. Add an
# instrumented-tests job later when you have a few key Compose UI tests.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # lets you run it manually from the Actions tab

permissions:
  contents: read

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # Tests don't need real API keys — the test code never calls the
      # network. But the build script reads local.properties for the bake-in
      # logic, so we drop a stub in to keep that codepath happy.
      - name: Stub local.properties
        run: |
          echo "safe.companion.anthropic.api.key=" >> local.properties
          echo "safe.companion.elevenlabs.api.key=" >> local.properties
          echo "safe.companion.feedback.form.url=" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (standard flavor, debug build)
        run: ./gradlew :app:testStandardDebugUnitTest --no-daemon --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          retention-days: 7

  build-check:
    name: Debug APK assembles
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Stub local.properties
        run: |
          echo "safe.companion.anthropic.api.key=" >> local.properties
          echo "safe.companion.elevenlabs.api.key=" >> local.properties
          echo "safe.companion.feedback.form.url=" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleStandardDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: safe-companion-debug-apk
          path: app/build/outputs/apk/standard/debug/*.apk
          retention-days: 14
